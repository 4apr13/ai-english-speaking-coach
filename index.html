<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英语口语陪练</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎙️ AI 英语口语陪练</h1>

        <div class="scene-section">
            <label>选择练习场景：</label>
            <div class="scene-buttons">
                <button class="scene-btn active" data-scene="interview">💼 面试</button>
                <button class="scene-btn" data-scene="ordering">🍔 点餐</button>
                <button class="scene-btn" data-scene="meeting">📊 会议</button>
                <button class="scene-btn" data-scene="travel">✈️ 旅行</button>
                <button class="scene-btn" data-scene="smalltalk">💬 日常对话</button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-box" id="chatBox"></div>
        </div>

        <div class="control-section">
            <button id="recordBtn" class="record-btn">🎤 点击说话</button>
            <div class="status" id="status">⚪ 准备就绪</div>
        </div>

        <div class="correction-section" id="correctionSection" style="display:none;">
            <h3>✏️ 语法/表达建议</h3>
            <div class="correction-text" id="correctionText"></div>
        </div>

        <button id="reportBtn" class="report-btn">📋 生成课后总结</button>
        <div class="report-section" id="reportSection" style="display:none;">
            <h3 style="padding:16px 16px 0; color:#333;">📈 本节课总结</h3>
            <div id="reportContent" style="padding:16px;"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="prompts.js"></script>
    <script src="script.js"></script>
</body>
</html>
