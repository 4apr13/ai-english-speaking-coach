<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英语口语陪练</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 背景装饰气泡 -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">

        <!-- 顶部插画区 -->
        <div class="hero-section">
            <div class="hero-illustration">
                <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" class="hero-svg">
                    <!-- 人物头部 -->
                    <circle cx="100" cy="55" r="22" fill="#FFD4C2"/>
                    <!-- 耳机 -->
                    <path d="M78 50 Q78 30 100 30 Q122 30 122 50" stroke="#FF6B4A" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <rect x="74" y="48" width="8" height="14" rx="4" fill="#FF6B4A"/>
                    <rect x="118" y="48" width="8" height="14" rx="4" fill="#FF6B4A"/>
                    <!-- 眼睛 -->
                    <circle cx="93" cy="54" r="3" fill="#5D4037"/>
                    <circle cx="107" cy="54" r="3" fill="#5D4037"/>
                    <!-- 微笑 -->
                    <path d="M93 63 Q100 69 107 63" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <!-- 身体 -->
                    <path d="M85 77 Q85 95 100 95 Q115 95 115 77" fill="#FF6B4A" opacity="0.8"/>
                    <!-- 对话气泡1 -->
                    <rect x="125" y="20" width="55" height="28" rx="10" fill="white" opacity="0.9" class="bubble-float"/>
                    <text x="152" y="38" text-anchor="middle" font-size="11" fill="#FF6B4A" font-family="Nunito" font-weight="700">Hello! 👋</text>
                    <!-- 对话气泡2 -->
                    <rect x="18" y="35" width="52" height="26" rx="10" fill="white" opacity="0.9" class="bubble-float-2"/>
                    <text x="44" y="52" text-anchor="middle" font-size="10" fill="#4A90D9" font-family="Nunito" font-weight="700">Let's talk!</text>
                    <!-- 星星装饰 -->
                    <text x="160" y="15" font-size="12" class="star-twinkle">✨</text>
                    <text x="25" y="25" font-size="10" class="star-twinkle-2">⭐</text>
                    <text x="175" y="75" font-size="8" class="star-twinkle">✨</text>
                </svg>
            </div>
            <div class="hero-text">
                <h1>AI 英语口语陪练</h1>
                <p class="hero-subtitle">用真实对话，练出地道英语 🌟</p>
            </div>
        </div>

        <!-- 场景选择 -->
        <div class="scene-section">
            <div class="section-label">
                <span class="label-dot"></span>
                选择今天的练习场景
            </div>
            <div class="scene-grid">
                <button class="scene-card active" data-scene="interview">
                    <div class="scene-icon">💼</div>
                    <div class="scene-name">面试</div>
                    <div class="scene-desc">模拟求职英语对话</div>
                    <div class="scene-check">✓</div>
                </button>
                <button class="scene-card" data-scene="ordering">
                    <div class="scene-icon">🍔</div>
                    <div class="scene-name">点餐</div>
                    <div class="scene-desc">练习餐厅英语表达</div>
                    <div class="scene-check">✓</div>
                </button>
                <button class="scene-card" data-scene="meeting">
                    <div class="scene-icon">📊</div>
                    <div class="scene-name">会议</div>
                    <div class="scene-desc">职场英语沟通技巧</div>
                    <div class="scene-check">✓</div>
                </button>
                <button class="scene-card" data-scene="travel">
                    <div class="scene-icon">✈️</div>
                    <div class="scene-name">旅行</div>
                    <div class="scene-desc">酒店出行英语实战</div>
                    <div class="scene-check">✓</div>
                </button>
                <button class="scene-card" data-scene="smalltalk">
                    <div class="scene-icon">💬</div>
                    <div class="scene-name">日常对话</div>
                    <div class="scene-desc">与母语者自然闲聊</div>
                    <div class="scene-check">✓</div>
                </button>
            </div>
        </div>

        <!-- 对话区域 -->
        <div class="chat-section">
            <div class="chat-header">
                <div class="chat-header-avatar">👩‍💼</div>
                <div class="chat-header-info">
                    <div class="chat-header-name">AI 英语教练</div>
                    <div class="chat-header-status">
                        <span class="status-dot"></span> 在线
                    </div>
                </div>
                <div class="chat-header-badge">FREE TALK</div>
            </div>
            <div class="chat-box" id="chatBox"></div>
        </div>

        <!-- 录音控制 -->
        <div class="control-section">
            <div class="record-wrap">
                <div class="ripple-ring ring-1"></div>
                <div class="ripple-ring ring-2"></div>
                <div class="ripple-ring ring-3"></div>
                <button id="recordBtn" class="record-btn">
                    <span class="record-icon">🎤</span>
                    <span class="record-text">点击说话</span>
                </button>
            </div>
            <div class="status" id="status">⚪ 准备就绪，可以开始说话</div>
            <div class="tips-row">
                <span class="tip-badge">💡 说完后点击停止</span>
                <span class="tip-badge">🤔 停顿不会打断</span>
                <span class="tip-badge">⏸️ 可随时打断AI</span>
            </div>
        </div>

        <!-- 语法纠错 -->
        <div class="correction-section" id="correctionSection" style="display:none;">
            <div class="correction-header">
                <span>✏️ 表达小提示</span>
                <button class="correction-close" onclick="document.getElementById('correctionSection').style.display='none'">×</button>
            </div>
            <div class="correction-text" id="correctionText"></div>
        </div>

        <!-- 课后总结 -->
        <button id="reportBtn" class="report-btn">
            <span>📋</span> 生成课后总结
        </button>
        <div class="report-section" id="reportSection" style="display:none;">
            <div class="report-header">
                <span>📈 本节课总结</span>
                <span class="report-badge">AI 智能分析</span>
            </div>
            <div id="reportContent" style="padding:16px;"></div>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="prompts.js"></script>
    <script src="script.js"></script>
</body>
</html>
